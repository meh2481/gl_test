name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Cache apt packages
        uses: actions/cache@v4
        id: cache-apt
        with:
          path: |
            ~/apt-cache/*.deb
          key: apt-packages-${{ runner.os }}-v1

      - name: Restore apt cache
        if: steps.cache-apt.outputs.cache-hit == 'true'
        run: |
          sudo mkdir -p /var/cache/apt/archives
          sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/

      - name: Install required libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev vulkan-tools glslc liblua5.4-dev libpng-dev libsquish-dev libopenal-dev libopusfile-dev

      - name: Prepare apt cache for saving
        run: |
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/

      - name: Cache SDL3
        uses: actions/cache@v4
        id: cache-sdl3
        with:
          path: |
            ~/.local/lib/libSDL3*
            ~/.local/include/SDL3
            ~/.local/lib/cmake/SDL3
            ~/.local/lib/pkgconfig/sdl3.pc
            ~/.local/share/licenses/SDL3
          key: sdl3-${{ runner.os }}-release-3.2.0-v1

      - name: Install SDL3 from source
        if: steps.cache-sdl3.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch release-3.2.0 https://github.com/libsdl-org/SDL.git SDL3
          cd SDL3
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DSDL_UNIX_CONSOLE_BUILD=ON -DCMAKE_INSTALL_PREFIX=$HOME/.local ..
          cmake --build . -j$(nproc)
          make install
          cd ../..
          rm -rf SDL3

      - name: Cache Box2D v3
        uses: actions/cache@v4
        id: cache-box2d
        with:
          path: |
            ~/.local/lib/libbox2d*
            ~/.local/include/box2d
            ~/.local/lib/cmake/box2d
          key: box2d-${{ runner.os }}-v3.1.1-v3

      - name: Install box2d v3 from source, without examples
        if: steps.cache-box2d.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/erincatto/box2d.git
          cd box2d
          git checkout v3.1.1
          mkdir build && cd build
          cmake -DBOX2D_SAMPLES=OFF -DBOX2D_DOCS=OFF -DBOX2D_VALIDATE=OFF -DBOX2D_UNIT_TESTS=OFF -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX=$HOME/.local ..
          cmake --build .
          make install

      - name: Cache ImGui
        uses: actions/cache@v4
        id: cache-imgui
        with:
          path: |
            ~/.local/lib/libimgui.so
            ~/.local/include/imgui*.h
            ~/.local/include/imstb*.h
            ~/.local/include/imconfig.h
          key: imgui-${{ runner.os }}-v1.92.4-sdl3-vulkan-v1

      - name: Build and install ImGui with SDL3 and Vulkan backend
        if: steps.cache-imgui.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/ocornut/imgui.git
          cd imgui
          git checkout v1.92.4
          g++ -fPIC -I. -I$HOME/.local/include -c imgui.cpp -o imgui.o
          g++ -fPIC -I. -I$HOME/.local/include -c imgui_demo.cpp -o imgui_demo.o
          g++ -fPIC -I. -I$HOME/.local/include -c imgui_draw.cpp -o imgui_draw.o
          g++ -fPIC -I. -I$HOME/.local/include -c imgui_tables.cpp -o imgui_tables.o
          g++ -fPIC -I. -I$HOME/.local/include -c imgui_widgets.cpp -o imgui_widgets.o
          g++ -fPIC -I. -I$HOME/.local/include -c misc/cpp/imgui_stdlib.cpp -o imgui_stdlib.o
          g++ -fPIC -I. -I$HOME/.local/include -c backends/imgui_impl_vulkan.cpp -o imgui_impl_vulkan.o
          g++ -fPIC -I. -I$HOME/.local/include -c backends/imgui_impl_sdl3.cpp -o imgui_impl_sdl3.o
          g++ -shared -o libimgui.so *.o
          mkdir -p $HOME/.local/lib $HOME/.local/include
          cp libimgui.so $HOME/.local/lib/
          cp *.h $HOME/.local/include/
          cp backends/imgui_impl_vulkan.h $HOME/.local/include/
          cp backends/imgui_impl_sdl3.h $HOME/.local/include/
          cp misc/cpp/imgui_stdlib.h $HOME/.local/include/
          cd ..
          rm -rf imgui

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          quiet: true
          cache: true

      - name: Build the project
        run: |
          mkdir -p build
          cd build
          export PKG_CONFIG_PATH=$HOME/.local/lib/pkgconfig:$PKG_CONFIG_PATH
          cmake -DCMAKE_PREFIX_PATH=$HOME/.local:/usr/local ..
          make

      - name: Cleanup Box2D/imgui folders
        run: |
          git rm --cached -r box2d || true
          rm -rf box2d 2>/dev/null || true
          git rm --cached -r imgui || true
          rm -rf imgui 2>/dev/null || true

  build-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Cache apt packages (Windows job)
        uses: actions/cache@v4
        id: cache-apt-win
        with:
          path: ~/apt-cache-win/*.deb
          key: apt-packages-win-${{ runner.os }}-v1

      - name: Restore apt cache (Windows job)
        if: steps.cache-apt-win.outputs.cache-hit == 'true'
        run: |
          sudo mkdir -p /var/cache/apt/archives
          sudo cp ~/apt-cache-win/*.deb /var/cache/apt/archives/

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 binutils-mingw-w64-x86-64 \
            libvulkan-dev vulkan-tools glslc \
            libpng-dev libsquish-dev \
            cmake pkg-config python3 nasm zstd

      - name: Prepare apt cache for saving (Windows job)
        run: |
          mkdir -p ~/apt-cache-win
          cp /var/cache/apt/archives/*.deb ~/apt-cache-win/ 2>/dev/null || true

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          quiet: true
          cache: true

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Cache Windows cross-compile dependencies
        uses: actions/cache@v4
        id: cache-win64-deps
        with:
          path: ~/.win64
          key: win64-deps-${{ runner.os }}-v7  # v7: build OpenAL from source for headers/import-lib; package prebuilt DLL at artifact time

      - name: Build Windows cross-compile dependencies
        if: steps.cache-win64-deps.outputs.cache-hit != 'true'
        run: |
          set -e
          SYSROOT=$HOME/.win64
          CROSS=x86_64-w64-mingw32
          mkdir -p $SYSROOT/lib/pkgconfig $SYSROOT/include $SYSROOT/bin

          # --- zlib (required by libpng) ---
          curl -fsSL https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz | tar xz
          cd zlib-1.3.1
          CC=$CROSS-gcc AR=$CROSS-ar RANLIB=$CROSS-ranlib \
            ./configure --prefix=$SYSROOT --static
          make -j$(nproc) && make install
          cd ..

          # --- libpng ---
          curl -fsSL https://downloads.sourceforge.net/libpng/libpng-1.6.43.tar.xz | tar xJ
          cd libpng-1.6.43
          CC=$CROSS-gcc AR=$CROSS-ar RANLIB=$CROSS-ranlib \
            ./configure --host=$CROSS --prefix=$SYSROOT \
            --disable-shared --enable-static \
            CPPFLAGS="-I$SYSROOT/include" LDFLAGS="-L$SYSROOT/lib"
          make -j$(nproc) && make install
          cd ..

          # --- libsquish (compile source files directly) ---
          curl -fsSL "https://sourceforge.net/projects/libsquish/files/libsquish-1.15.tgz/download" \
            -o libsquish-1.15.tgz
          mkdir squish && tar xzf libsquish-1.15.tgz -C squish
          cd squish
          $CROSS-g++ -O2 -I. -c \
            alpha.cpp clusterfit.cpp colourblock.cpp colourfit.cpp \
            colourset.cpp maths.cpp rangefit.cpp singlecolourfit.cpp squish.cpp
          $CROSS-ar rcu libsquish.a *.o
          $CROSS-ranlib libsquish.a
          cp libsquish.a $SYSROOT/lib/
          cp squish.h $SYSROOT/include/
          cat > $SYSROOT/lib/pkgconfig/libsquish.pc << EOF
          prefix=$SYSROOT
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: libsquish
          Description: DXT Compression Library
          Version: 1.15
          Libs: -L\${libdir} -lsquish
          Cflags: -I\${includedir}
          EOF
          cd ..

          # --- SDL3 pre-built MinGW development package ---
          curl -fsSL https://github.com/libsdl-org/SDL/releases/download/release-3.2.0/SDL3-devel-3.2.0-mingw.tar.gz \
            | tar xz
          cp -r SDL3-3.2.0/x86_64-w64-mingw32/. $SYSROOT/

          # --- Vulkan-Headers (cross-platform headers) ---
          git clone --depth=1 --branch vulkan-sdk-1.3.296.0 \
            https://github.com/KhronosGroup/Vulkan-Headers.git
          cd Vulkan-Headers
          cmake -DCMAKE_INSTALL_PREFIX=$SYSROOT .
          cmake --install .
          cd ..

          # --- Vulkan-Loader (produces vulkan-1.dll + import library for Windows) ---
          git clone --depth=1 --branch vulkan-sdk-1.3.296.0 \
            https://github.com/KhronosGroup/Vulkan-Loader.git
          cmake -S Vulkan-Loader -B Vulkan-Loader/build \
            -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/cmake/toolchains/mingw64.cmake \
            -DMINGW64_SYSROOT=$SYSROOT \
            -DCMAKE_INSTALL_PREFIX=$SYSROOT \
            -DVULKAN_HEADERS_INSTALL_DIR=$SYSROOT \
            -DENABLE_WERROR=OFF \
            -DBUILD_TESTS=OFF
          cmake --build Vulkan-Loader/build -j$(nproc)
          cmake --install Vulkan-Loader/build

          # --- Lua 5.4 (static library) ---
          curl -fsSL https://www.lua.org/ftp/lua-5.4.7.tar.gz | tar xz
          cd lua-5.4.7/src
          $CROSS-gcc -O2 -c \
            lapi.c lcode.c lctype.c ldebug.c ldo.c ldump.c lfunc.c lgc.c llex.c \
            lmem.c lobject.c lopcodes.c lparser.c lstate.c lstring.c ltable.c \
            ltm.c lundump.c lvm.c lzio.c \
            lauxlib.c lbaselib.c lcorolib.c ldblib.c liolib.c lmathlib.c \
            loadlib.c loslib.c lstrlib.c ltablib.c lutf8lib.c linit.c
          $CROSS-ar rcu liblua5.4.a *.o
          $CROSS-ranlib liblua5.4.a
          cp liblua5.4.a $SYSROOT/lib/
          cp lua.h luaconf.h lualib.h lauxlib.h lua.hpp $SYSROOT/include/
          cat > $SYSROOT/lib/pkgconfig/lua5.4.pc << EOF
          prefix=$SYSROOT
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include
          Name: Lua 5.4
          Description: Lua scripting language
          Version: 5.4.7
          Libs: -L\${libdir} -llua5.4
          Cflags: -I\${includedir}
          EOF
          cd ../..

          # --- Box2D v3.1.1 ---
          git clone https://github.com/erincatto/box2d.git
          cd box2d
          git checkout v3.1.1
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/cmake/toolchains/mingw64.cmake \
            -DMINGW64_SYSROOT=$SYSROOT \
            -DCMAKE_INSTALL_PREFIX=$SYSROOT \
            -DBOX2D_SAMPLES=OFF -DBOX2D_DOCS=OFF \
            -DBOX2D_VALIDATE=OFF -DBOX2D_UNIT_TESTS=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build build -j$(nproc)
          cmake --install build
          cd ..

          # --- OpenAL-soft (built from source for headers + import library) ---
          # We build the shared library so we get the correct import .dll.a and headers
          # to link against.  The resulting 101 MB DLL is NOT packaged; at artifact time
          # we download the official ~1 MB prebuilt DLL from the kcat/openal-soft
          # GitHub releases page and package that instead.
          git clone --depth=1 https://github.com/kcat/openal-soft.git
          cmake -S openal-soft -B openal-soft/build \
            -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/cmake/toolchains/mingw64.cmake \
            -DMINGW64_SYSROOT=$SYSROOT \
            -DCMAKE_INSTALL_PREFIX=$SYSROOT \
            -DALSOFT_EXAMPLES=OFF -DALSOFT_TESTS=OFF -DALSOFT_UTILS=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_SHARED_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          cmake --build openal-soft/build -j$(nproc)
          cmake --install openal-soft/build

          # --- libogg (required by libopusfile) ---
          curl -fsSL https://downloads.xiph.org/releases/ogg/libogg-1.3.5.tar.xz | tar xJ
          cd libogg-1.3.5
          ./configure --host=$CROSS --prefix=$SYSROOT \
            --disable-shared --enable-static
          make -j$(nproc) && make install
          cd ..

          # --- libopus ---
          curl -fsSL https://downloads.xiph.org/releases/opus/opus-1.5.2.tar.gz | tar xz
          cd opus-1.5.2
          ./configure --host=$CROSS --prefix=$SYSROOT \
            --disable-shared --enable-static
          make -j$(nproc) && make install
          cd ..

          # --- libopusfile ---
          curl -fsSL https://downloads.xiph.org/releases/opus/opusfile-0.12.tar.gz | tar xz
          cd opusfile-0.12
          PKG_CONFIG_LIBDIR=$SYSROOT/lib/pkgconfig \
            ./configure --host=$CROSS --prefix=$SYSROOT \
            --disable-shared --enable-static --disable-http \
            CFLAGS="-I$SYSROOT/include" LDFLAGS="-L$SYSROOT/lib"
          make -j$(nproc) && make install
          cd ..

      - name: Build native packer (host executable for resource packing)
        run: |
          mkdir -p build-native
          cd build-native
          # SDL3 headers are cross-platform C headers; reuse them from the Windows sysroot
          # so packer.cpp can include ResourceTypes.h without a full SDL3 installation.
          cmake -DBUILD_GAME=OFF -DCMAKE_CXX_FLAGS="-I$HOME/.win64/include" ..
          make packer

      - name: Cross-compile packer.exe and shader_triangle.exe for Windows
        run: |
          mkdir -p build-windows
          cd build-windows
          export PKG_CONFIG_LIBDIR=$HOME/.win64/lib/pkgconfig
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/cmake/toolchains/mingw64.cmake \
            -DMINGW64_SYSROOT=$HOME/.win64 \
            -DNATIVE_PACKER=$GITHUB_WORKSPACE/build-native/packer \
            -DCMAKE_PREFIX_PATH=$HOME/.win64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DVulkan_INCLUDE_DIR=$HOME/.win64/include \
            -DVulkan_LIBRARY=$HOME/.win64/lib/libvulkan-1.dll.a \
            ..
          make packer shader_triangle
          # Collect the executable and the SDL3 runtime DLL needed to run it
          mkdir -p $GITHUB_WORKSPACE/artifacts
          cp shader_triangle.exe $GITHUB_WORKSPACE/artifacts/
          cp packer.exe $GITHUB_WORKSPACE/artifacts/
          cp res.pak $GITHUB_WORKSPACE/artifacts/
          cp $HOME/.win64/bin/SDL3.dll $GITHUB_WORKSPACE/artifacts/
          cp $HOME/.win64/bin/vulkan-1.dll $GITHUB_WORKSPACE/artifacts/
          # Download the official ~1 MB prebuilt OpenAL32.dll from kcat/openal-soft releases.
          # The DLL we built from source is ~101 MB (static libstdc++ linked in); the official
          # prebuilt binary is functionally identical but vastly smaller.
          OPENAL_VERSION=1.25.1
          curl -fsSL "https://github.com/kcat/openal-soft/releases/download/${OPENAL_VERSION}/openal-soft-${OPENAL_VERSION}-bin.zip" -o /tmp/openal-bin.zip
          python3 -m zipfile -e /tmp/openal-bin.zip /tmp/openal-bin/
          # The prebuilt DLL is named soft_oal.dll; rename to OpenAL32.dll (the name the app loads at runtime)
          cp "/tmp/openal-bin/openal-soft-${OPENAL_VERSION}-bin/bin/Win64/soft_oal.dll" $GITHUB_WORKSPACE/artifacts/OpenAL32.dll

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shader_triangle-windows-x64
          path: artifacts/
          if-no-files-found: error